// ── GRAMMAR RULES ────────────────────────────────────────────────────────────

const GRAMMAR_RULES = [
  { label: "Word Order", text: "Velthari follows VSO order: Verb → Subject → Object. Locative adjuncts (phrases ending in -vel or beginning with en) may appear immediately after the verb and before the subject — the canonical position for scene-setting location phrases.", example: "Ve-helu kireth-vel kalun oran. — PRES-be shadow-LOC spirit true — A true spirit dwells in the shadow." },
  { label: "Tense Prefixes", text: "Tense is marked by a prefix on the verb: na- (past), ve- (present), ku- (future). Unmarked verbs are imperatives.", example: "na-tan sol / ve-tan sol / ku-tan sol — he spoke / he speaks / he will speak" },
  { label: "Plural", text: "Nouns take the suffix -an to form the plural.", example: "oru → oru-an (person → people),  kenu → kenu-an (bird → birds)" },
  { label: "Genitive", text: "Possession is marked by the suffix -shi on the possessor (the one who owns). It attaches to the owner, not the thing owned.", example: "horu mi-shi — home (I-GEN) — my home.  reth sol-shi — name (he-GEN) — his name." },
  { label: "Locative", text: "The bound suffix -vel attaches to nouns to mark location ('in/at/on'). For pronouns or phrases that cannot take a suffix, use the free particle en instead.", example: "horu-vel — at home;  runa-vel — in the river;  en mi — near me (pronoun, can't take -vel)" },
  { label: "Negation", text: "The particle oth precedes the verb to negate a clause.", example: "Oth ve-keth mi vethu. — I do not see the moon." },
  { label: "Adjectives", text: "Adjectives follow the nouns they modify and agree in number by also taking -an in the plural. When a noun bears -vel or other suffixes, the adjective follows the fully-suffixed noun and does not repeat the suffix.", example: "oru venu — good person;  oru-an venu-an — good people;  horu-vel venu — at the good home" },
  { label: "Ditransitive Verbs", text: "Verbs with two objects (e.g. 'give X to Y') use the particle ash before the indirect object. Word order: VERB — SUBJECT — ash INDIRECT.OBJ — DIRECT.OBJ.", example: "Na-ros miru mi-shi ash mi perath. — My friend gave a gift to me." },
  { label: "Pronoun Plurals", text: "Pronouns form plurals identically to nouns, via the suffix -an. This is a regular, productive rule — no suppletive forms.", example: "mi → mian (I → we),  thu → thuan (you → y'all),  sol → solan (he/she → they)" },
  { label: "Yes/No Questions", text: "Add the particle sevi at the end of any declarative clause to form a yes/no question. Nothing else in the sentence changes.", example: "Ve-keth mi solir sevi? — Do I see the sun?  Ve-cha thu mi sevi? — Do you love me?" },
  { label: "Content Questions", text: "Interrogative words (sethun what, orush who, navesh where, velush when) move to clause-initial position, before the verb, regardless of the grammatical role they fill. They do not remain in-situ — even a subject interrogative fronts past the verb.", example: "Sethun ve-ros sol ash thu? — What is he giving to you?  Orush na-lau rav ashen? — Who came from the sea?" },
  { label: "Aspect", text: "Velthari does not grammatically mark aspect. Tense prefixes encode only when an event occurs, not its internal structure. The distinction between 'I ate' and 'I was eating' is left to context or temporal adverbs such as velun (moment) or nalu (night).", example: "na-mar mi — I ate / I was eating (context disambiguates)" },
  { label: "Numbers: Teens (11–19)", text: "Prefix laurn- to the unit: laurn-[unit]. Read as a single compound word.", example: "laurn-ven = 11,  laurn-thos = 12,  laurn-kirav = 15,  laurn-sorin = 19" },
  { label: "Numbers: Tens (20, 30…)", text: "Prefix a multiplier to laurn: [unit]-laurn. In compound number words, stress falls on the first element (the multiplier) — an exception to the general penultimate rule.", example: "thos-laurn = 20,  roth-laurn = 30,  shev-laurn = 40,  kirav-laurn = 50" },
  { label: "Numbers: Compound (21, 35…)", text: "Stack tens and units: [unit]-laurn-[unit]. The tens block always precedes the units.", example: "thos-laurn-ven = 21,  roth-laurn-kirav = 35,  kirav-laurn-azel = 56" },
  { label: "Numbers: Hundreds & Thousands", text: "100 is elurn; 1000 is shaurn. They combine with multipliers identically to laurn.", example: "thos-elurn = 200,  roth-shaurn = 3000,  ven-elurn thos-laurn-roth = 123" },
];

// ── DERIVATION RULES ──────────────────────────────────────────────────────────

const DERIV_RULES = [
  {
    id: "or", suffix: "-or", inputPos: "verb", outputPos: "noun",
    label: "Agentive Noun", arrow: "verb → noun",
    desc: "One who habitually performs the action. Drop the final vowel of the verb stem (if present) before adding -or.",
    example: "tan → tanor (speaker, orator),  keth → kethor (seer, lookout),  zelav → zelavor (singer)",
    form: w => w.replace(/[aeiou]$/, "") + "or",
    gloss: def => { const c = def.split(",")[0].replace(/^to /, "").trim(); return `one who ${c}s`; },
  },
  {
    id: "im", suffix: "-im", inputPos: "verb", outputPos: "noun",
    label: "Action Noun", arrow: "verb → noun",

    example: "tan → tanim (utterance, a saying),  nor → norim (a thought),  zeleth → zelethim (a dream)",
    form: w => w + "im",
    gloss: def => { const c = def.split(",")[0].replace(/^to /, "").trim(); return `the act of ${c}ing`; },
  },
  {
    id: "esh", suffix: "-esh", inputPos: "noun", outputPos: "adj",

    example: "ashen → ashenesh (oceanic, maritime),  solir → soliresh (solar),  zelun → zelunesh (musical)",

    form: w => w + "ath",
    gloss: def => `the quality of being ${def.split(",")[0].trim()}`,

  {
    id: "in", suffix: "-in", inputPos: "noun", outputPos: "adj",
    label: "Characterizing Adjective", arrow: "noun → adj",
    desc: "Full of, marked by, or prone to the noun. Appended directly. Not applied to nouns already ending in -in.",

    filter: w => !w.endsWith("in"),
  },
  {
    id: "av", suffix: "-av", inputPos: "noun", outputPos: "verb",
    label: "Denominal Verb", arrow: "noun → verb",
    desc: "To work with, practice, or engage in the noun. Appended directly. Not applied to nouns already ending in -av.",
    example: "zelun → zelunav (to make music),  lether → lethrav? No: lether → letherав → lethеrav (to read/write),  mirel → mirelav (to long, to ache)",
    form: w => w + "av",
    gloss: def => `to work with or practice ${def.split(",")[0].trim()}`,
    filter: w => !w.endsWith("av"),
  },
];

function Overview() {
  return (
    <div>
      <div className="vt-section-title">Overview</div>
      <p className="vt-section-desc">The nature and history of Velthari</p>
      <p className="vt-prose">
        <em>Velthari</em> — lit. <em>"the silver tongue"</em>, from archaic <em>vel</em> (silver, precious) and <em>thari</em>
        (tongue, utterance) — is the constructed language of the Velthrin, a seafaring scholarly culture whose
        settlements trace the coasts of a vast inland sea. Velthari is notable for its <strong>agglutinative morphology</strong>,
        an unusual <strong>VSO word order</strong>, and a rich vocabulary drawn from the natural world.
      </p>
      <p className="vt-prose">
        The language prizes <strong>precision of feeling</strong> over precision of fact. Where other languages multiply
        tense markers, Velthari multiplies terms for emotional states. The word <em>mirel</em> means not just
        "heart" but the particular ache of longing for a place one has never been — an untranslatable
        compression of homesickness and desire into a single word.
      </p>

      <div className="vt-h3">Quick Reference</div>
      <table className="vt-paradigm-table">
        <thead><tr><th>Feature</th><th>Value</th></tr></thead>
        <tbody>
          {[
            ["Word Order","VSO (Verb–Subject–Object)"],
            ["Morphology","Agglutinative"],
            ["Tense","Prefix on verb (na- past, ve- present, ku- future)"],
            ["Plural","Suffix -an"],
            ["Possession","Suffix -shi on possessor"],
            ["Location","Suffix -vel (on nouns); free particle en (for pronouns)"],
            ["Negation","Particle oth before verb"],
            ["Questions","sevi clause-final (yes/no); fronted interrogative (content)"],
            ["Adjectives","Post-nominal; agree in number; suffixes mark head noun only"],
            ["Aspect","Not grammatically marked — context and adverbs disambiguate"],
            ["Consonants","15"], ["Vowels","5 + 2 diphthongs (ei /ɛɪ/, au /aʊ/)"],
            ["Base Lexicon", `${LEXICON.length} words`],
            ["With Derivations", `${LEXICON.length + DERIVED_LEXICON.length} words`],
          ].map(([f, v]) => (
            <tr key={f}><td><strong>{f}</strong></td><td className="vt-velthari">{v}</td></tr>
          ))}
        </tbody>
      </table>

      <div className="vt-h3">Sample Sentences</div>
      {SAMPLE_SENTENCES.map((s, i) => (
        <div key={i} className="vt-sample-block">
          <div className="vt-sample-velthari">{s.velthari}</div>
          <div className="vt-sample-gloss">{s.gloss}</div>
          <div className="vt-sample-trans">"{s.trans}"</div>
        </div>
      ))}
    </div>
  );
}

function Phonology() {
  return (
    <div>
      <div className="vt-section-title">Phon<em>ology</em></div>
      <p className="vt-section-desc">Sounds and pronunciation of Velthari</p>
      <p className="vt-prose">
        Velthari has a moderate phonological inventory of <strong>15 consonants</strong> and <strong>5 vowels</strong> plus two
        diphthongs. Syllable structure follows <em>(C)V(C)</em>. Stress falls on the <strong>penultimate syllable</strong>
        in words of two or more syllables, with the exception of compound number words, which follow first-element stress.
      </p>
      <p className="vt-prose">
        The language strongly favors liquids and fricatives, giving it a flowing, sibilant quality.
        Of the stops, only <em>/d/</em> is voiced — an asymmetry that makes it perceptually distinct
        and limits its use to a small class of native roots. Voiced fricatives <em>/v/</em> and <em>/z/</em>
        coexist with this pattern, a feature shared by a handful of attested natural languages.
      </p>

      <div className="vt-h3">Consonants</div>
      <div className="vt-phoneme-grid">
        {PHONOLOGY.consonants.map(p => (
          <div key={p.sym} className="vt-phoneme-card">
            <span className="vt-phoneme-sym">{p.sym}</span>
            <span className="vt-phoneme-ipa">{p.ipa}</span>
          </div>
        ))}
      </div>

      <div className="vt-h3">Vowels &amp; Diphthongs</div>
      <div className="vt-phoneme-grid">
        {PHONOLOGY.vowels.map(p => (
          <div key={p.sym} className="vt-phoneme-card">
            <span className="vt-phoneme-sym">{p.sym}</span>
            <span className="vt-phoneme-ipa">{p.ipa}</span>
          </div>
        ))}
      </div>

      <div className="vt-h3">Phonotactics</div>
      {[
        { label: "Syllable Structure", text: "(C)V(C) — onset is optional; coda allows a single nasal, liquid, or fricative. Complex codas are not permitted in regular vocabulary. Exception: the number roots laurn, elurn, and shaurn preserve an archaic /rn/ coda found nowhere else in the language — a fossilized feature that survived because numerals resist phonological leveling.", example: "vel, kaur, aurin, stiv — regular;  laurn, elurn, shaurn — archaic /rn/ exception" },
        { label: "Consonant Clusters", text: "Only st- and initial clusters of stop+liquid are permitted at syllable onset. No complex codas in regular vocabulary.", example: "stiv /stiv/" },
        { label: "Diphthongs", text: "ei /ɛɪ/ and au /aʊ/ are the only permitted diphthongs; they share the height of the monophthong e /ɛ/. They behave as single vowel nuclei.", example: "kaur /kaʊr/ (fire),  sau /saʊ/ (to live),  lau /laʊ/ (to come)" },
        { label: "Stress", text: "Stress is penultimate in polysyllables. In monosyllables, stress is inherent. Exception: in compound number words, stress falls on the first element (the multiplier) rather than the penultimate syllable.", example: "VE-thu, AU-rin, SE-math — penultimate;  THOS-laurn (20), ROTH-laurn (30) — first-element stress" },
      ].map(r => (
        <div key={r.label} className="vt-rule-block">
          <div className="vt-rule-label">{r.label}</div>
          <div className="vt-rule-text">{r.text}</div>
          <div className="vt-rule-example">e.g. {r.example}</div>
        </div>
      ))}
    </div>
  );
}

function Grammar() {
  return (
    <div>
      <div className="vt-section-title">Gram<em>mar</em></div>
      <p className="vt-section-desc">Morphology, syntax, and the structure of Velthari</p>
      <p className="vt-prose">
        Velthari is <strong>agglutinative</strong>: grammatical meaning is encoded by stacking affixes onto roots
        rather than modifying the root itself. Roots remain stable, making the language learnable quickly
        though mastery of affix order takes time.
      </p>

      <div className="vt-h3">Core Grammar Rules</div>
      {GRAMMAR_RULES.map(r => (
        <div key={r.label} className="vt-rule-block">
          <div className="vt-rule-label">{r.label}</div>
          <div className="vt-rule-text">{r.text}</div>
          <div className="vt-rule-example">{r.example}</div>
        </div>
      ))}

      <div className="vt-h3">Pronouns</div>
      <table className="vt-paradigm-table">
        <thead><tr><th>Velthari</th><th>IPA</th><th>Meaning</th></tr></thead>
        <tbody>
          {PRONOUNS.map(([w, m, ipa]) => (
            <tr key={w}>
              <td className="vt-velthari">{w}</td>
              <td className="vt-gloss">{ipa}</td>
              <td>{m}</td>
            </tr>
          ))}
        </tbody>
      </table>

      <div className="vt-h3">Verb Conjugation Pattern</div>
      <table className="vt-paradigm-table">
        <thead><tr><th>Tense</th><th>Prefix</th><th>Example (tan — to speak)</th><th>Translation</th></tr></thead>
        <tbody>
          {[
            ["Past","na-","na-tan sol","he/she/it spoke"],
            ["Present","ve-","ve-tan sol","he/she/it speaks"],
            ["Future","ku-","ku-tan sol","he/she/it will speak"],
            ["Imperative","—","tan!","speak!"],
          ].map(([t,p,ex,tr]) => (
            <tr key={t}>
              <td><strong>{t}</strong></td>
              <td className="vt-velthari">{p}</td>
              <td className="vt-velthari">{ex}</td>
              <td className="vt-gloss">{tr}</td>
            </tr>
          ))}
        </tbody>
      </table>

      <div className="vt-h3">Derivational Morphology</div>
      <p className="vt-prose">
        Velthari has six productive derivational suffixes that generate new words from existing roots.
        These are not inflectional — they create new lexical entries, not grammatical variants. Derived forms
        are fully regular and can themselves serve as bases for further derivation.
      </p>
      {DERIV_RULES.map(r => (
        <div key={r.id} className="vt-deriv-rule">
          <div className="vt-deriv-header">
            <span className="vt-deriv-suffix">{r.suffix}</span>
            <span className="vt-deriv-label">{r.label}</span>
            <span className="vt-deriv-arrow">· {r.arrow}</span>
          </div>
          <div className="vt-deriv-desc">{r.desc}</div>
          <div className="vt-deriv-example">{r.example}</div>
        </div>
      ))}

      <div className="vt-h3">Affix Order on Nouns</div>
      <div className="vt-rule-block">
        <div className="vt-rule-label">Stacking Order</div>
        <div className="vt-rule-text">ROOT + plural (-an) + genitive (-shi) + locative (-vel)</div>
        <div className="vt-rule-example">
          horu → horu-an → horu-an-shi → horu-an-shi-vel<br />
          home → homes → (of the) homes → at (the) homes (of…)
        </div>
      </div>

      <div className="vt-h3">Number System</div>
      <table className="vt-paradigm-table">
        <thead><tr><th>Number</th><th>Velthari</th><th>Structure</th></tr></thead>
        <tbody>
          {[
            ["11","laurn-ven","10 + 1"],["15","laurn-kirav","10 + 5"],
            ["20","thos-laurn","2 × 10"],["30","roth-laurn","3 × 10"],
            ["21","thos-laurn-ven","(2×10) + 1"],["35","roth-laurn-kirav","(3×10) + 5"],
            ["99","sorin-laurn-sorin","(9×10) + 9"],["100","elurn","root"],
            ["200","thos-elurn","2 × 100"],["123","ven-elurn thos-laurn-roth","100 + 20 + 3"],
            ["1000","shaurn","root"],["3500","roth-shaurn kirav-elurn","3×1000 + 5×100"],
          ].map(([n,v,s]) => (
            <tr key={n}>
              <td><strong>{n}</strong></td>
              <td className="vt-velthari">{v}</td>
              <td className="vt-gloss">{s}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function Lexicon() {
  const [query, setQuery] = useState("");
  const [pos, setPos] = useState("all");
  const [showDerived, setShowDerived] = useState(false);

  const cats = ["all","verb","noun","adj","particle","number"];

  const allWords = useMemo(() => {
    if (showDerived) return [...LEXICON, ...DERIVED_LEXICON];
    return LEXICON;
  }, [showDerived]);

  const filtered = useMemo(() => {
    return allWords.filter(e => {
      const matchPos = pos === "all" || e.pos === pos;
      const q = query.toLowerCase();
      const matchQ = !q || e.word.includes(q) || e.def.toLowerCase().includes(q);
      return matchPos && matchQ;
    });
  }, [allWords, pos, query]);

  return (
    <div>
      <div className="vt-section-title">Lexi<em>con</em></div>
      <p className="vt-section-desc">
        {LEXICON.length} base words · {DERIVED_LEXICON.length} derived forms · {LEXICON.length + DERIVED_LEXICON.length} total
      </p>

      <div className="vt-lex-controls">
        <input
          className="vt-lexicon-search"
          placeholder="Search by word or meaning…"
          value={query}
          onChange={e => setQuery(e.target.value)}
        />
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
          <div className="vt-lex-filters">
            {cats.map(c => (
              <button key={c} className={`vt-lex-filter${pos === c ? " active" : ""}`} onClick={() => setPos(c)}>
                {c === "all" ? "All" : c === "adj" ? "Adjective" : c.charAt(0).toUpperCase() + c.slice(1)}
              </button>
            ))}
            <button
              className={`vt-lex-filter${showDerived ? " active" : ""}`}
              onClick={() => setShowDerived(v => !v)}
            >
              {showDerived ? "Hide Derived" : "Show Derived"}
            </button>
          </div>
          <span className="vt-lex-count">{filtered.length} result{filtered.length !== 1 ? "s" : ""}</span>
        </div>
      </div>

      {filtered.length === 0 && (
        <p className="vt-prose" style={{ fontStyle: "italic", color: "#4e3e24" }}>No words found.</p>
      )}

      <div className="vt-lex-grid">
        {filtered.map((e, i) => (
          <div key={e.word + i} className={`vt-lex-card${e.isDerived ? " derived" : ""}`}>
            <div className="vt-lex-word">{e.word}</div>
            <div className="vt-lex-pos">
              <span style={{ color: POS_COLORS[e.pos] || "#4e3e24" }}>{e.pos}</span>
              {e.isDerived && <span className="vt-derived-badge">{e.ruleId}</span>}
            </div>
            <div className="vt-lex-def">{e.def}</div>
            {e.ipa && <div className="vt-lex-ipa">{e.ipa}</div>}
            {e.isDerived && <div className="vt-derived-source">← from {e.derivedFrom}</div>}
          </div>
        ))}
      </div>
    </div>
  );
}

const TABS = [
  { id: "overview", label: "Overview" },
  { id: "phonology", label: "Phonology" },
  { id: "grammar", label: "Grammar" },
  { id: "lexicon", label: "Lexicon" },
];

function App() {
  const [tab, setTab] = useState("overview");
  return (
    <>
      <style>{style}</style>
      <div className="vt-root">
        <div className="vt-noise" />
        <header className="vt-hero">
          <div className="vt-supertitle">A Constructed Language</div>
          <div className="vt-title">Vel<em>thari</em></div>
          <div className="vt-subtitle">The Silver Tongue of the Velthrin Sea-Scholars</div>
          <div className="vt-ornament-line">✦ ✦ ✦</div>
          <p className="vt-tagline">
            "Ve-cha mi seval velthari." —<br />
            I love the Velthari word.
          </p>
        </header>
        <nav className="vt-nav">
          {TABS.map(t => (
            <button key={t.id} className={`vt-nav-btn${tab === t.id ? " active" : ""}`} onClick={() => setTab(t.id)}>
              {t.label}
            </button>
          ))}
        </nav>
        <main className="vt-content">
          {tab === "overview" && <Overview />}
          {tab === "phonology" && <Phonology />}
          {tab === "grammar" && <Grammar />}
          {tab === "lexicon" && <Lexicon />}
        </main>
        <footer className="vt-footer">
          Velthari Linguistic Reference · Second Edition · Compiled by the Velthrin Scribal Order
        </footer>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
